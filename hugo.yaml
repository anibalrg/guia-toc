title: Info TOC
baseURL: https://anibalrg.github.io/guia-toc/

module:
  imports:
    - path: github.com/imfing/hextra

layoutDir: layouts
locale: es
defaultContentLanguage: es
languages:
  es:
    label: Español
    weight: 1
  # en:
  #   label: English
  #   weight: 2

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
enableInlineShortcodes: true

outputs:
  home: [html, markdown, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

menu:
  main:
    - name: Buscar
      weight: 1
      params:
        type: search
    - name: Diccionario
      pageRef: /glosario
      weight: 2
    - name: Noticias
      url: /noticias
      weight: 10
      params:
        icons: newspaper
    - name: GitHub
      weight: 20
      url: https://github.com/anibalrg/guia-toc/
      params:
        icons: github

params:
  description: Información útil para familiares de personas con TOC
  navbar:
    displayTitle: true
    displayLogo: false
    logo:
      path: images/logo-black.png
      dark: images/logo-white.png
      link: /guia-toc
      width: 64

  externalLinkDecoration: true

  footer:
    displayCopyright: true
    displayPoweredBy: true

  theme:
    default: light
    displayToogle: true

  toc:
    displayTags: true

  imageZoom:
    enable: true

  page:
    width: wide
    contextMenu:
      enable: true

  # flexsearch enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      index: content
      tokenize: forward

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc

  highlight:
    copy:
      enable: true
      display: hover

  comments:
    enable: true

  markup:
    goldmark:
      parser:
        attribute:
          block: true
          title: true

  privacy:
    youTube:
      privacyEnhanced: true
