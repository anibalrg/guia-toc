- term: acomodación
  definition: |
    Conductas que realizamos familiares y amigos para reducir el malestar del afectado y adaptarnos a las exigencias del TOC. Son acomodaciones: participar en rituales, adaptar horarios, tranquilizar constantemente, contestar repetidas veces la misma pregunta, evitar ciertas situaciones, proporcionar jabón, gel o champú infinitos, permitir duchas interminables, etc.

- term: ansiedad
  definition: |
    Estado de alerta, preocupación o anticipación ante una posible amenaza futura, incierto o imaginada. En los afectados de TOC, suele aparecer debido o junto a las obsesiones porque la mente intenta eliminar completamente la duda, prevenir cualquier posibilidad o conseguir certeza absoluta. Mientras el miedo afirmaría «hay peligro», la ansiedad dudaría «¿y si hubiera peligro?».

- term: ciclo del TOC
  definition: La obsesión hace que aumente la ansiedad. La compulsión produce alivio temporal reduciendo la ansiedad, pero fortalece el TOC, haciendo que la necesidad de repetirla vuelva con más fuerza cada vez.

- term: compulsión
  definition: |
      Conducta física o mental difícil de resistir que se realiza para reducir la ansiedad o evitar un temor provocado por una obsesión. Compulsiones físicas son, por ejemplo: lavarse, tocar, comprobar, repetir acciones un número de veces determinado, preguntar varias veces lo mismo...; compulsiones mentales son: repetir frases, rezar, contar, analizar recuerdos, reemplazar pensamientos negativos por positivos, etc.

- term: disparador
  definition: Estímulo que activa las obsesiones que causan la ansiedad. Puede se una situación, un pensamiento, una imagen o una sensación.

- term: egodistónico
  definition: Pensamiento, imágen, sentimiento o conducta que está en conflicto con los valores, las  creencias y la autopercepción de la persona, causándole angustia, malestar, repugnancia, asco, miedo, ansiedad, etc. Los afectados por TOC luchan contra sus pensamientos porque no se identifican con ellos.

- term: EPR
  definition: Exposición con Prevención de Respuesta. Técnica usada en la Terapia cognitivo-conductual (TCC) para tratar el TOC, basada en la exposición gradual a las situaciones que generan malestar, evitando realizar las conductas de alivio aprendidas (compulsiones) para reducir la ansiedad, aprendiendo a convivir con ella y dejando que se reduzca de forma natural.

- term: evitación
  definition: Alejarse de situaciones, personas, pensamientos, lugares u objetos que pueden activar las obsesiones. Es una respuesta lógica y natural que produce alivio a corto plazo, pero contribuye a perpetuar el TOC pues es lo contrario de la exposición.

- term: extinción
  definition: Proceso mediante el que el cerebro aprende que el miedo, peligro o amenaza temida no ocurre y la ansiedad disminuye sin necesidad de compulsiones.

- term: GAM
  definition: |
    Grupo de Ayuda o Apoyo Mutuo. Grupos presenciales o en línea para personas con TOC, familiares y amigos,  moderados por profesionales de la salud, agentes de apoyo mútuo o personas con TOC.

- term: habituación
  definition: Disminución gradual de la ansiedad cuando la persona permanece el tiempo suficiente ante aquello que teme sin evitarlo ni realizar compulsiones.

- term: ISRS
  definition: |
    Inhibidor Selectivo de la Recaptación de la Serotonina. Son el grupo de antidepresivos —junto con la clomipramina— que se usan como tratamiento para el TOC en la actualidad. Los más conocidos son: sertralina, fluoxetina y paroxetina.

- term: miedo
  definition: Respuesta emocional ante un peligro que percibimos como inmediato y claramente identificable. Se procesa en la amigdala cerebral, que prepara el cuerpo para reaccionar inmediatamente para huir, protegerse o defenderse. Suele estar ligado al contenido de la obsesión.

- term: neutralización
  definition: |
    Intento de reducir la sensación de amenaza o culpa y la ansiedad provocada por una obsesión mediante compulsiones o evitaciones. Todo tipo de neutralización produce alivio momentáneo porque reduce la ansiedad, pero refuerza el TOC porque el cerebro aprende que la obsesión es importante o peligrosa.

- term: obsesión
  definition: Pensamiento, imagen, duda, impulso o sensación repetitiva e involuntaria que provoca malestar, culpa o ansiedad al interpretarse como muy importante o peligroso, generando mucha angustia, culpa o miedo. Toda obsesión comienza con un pensamiento intrusivo, pero no todo pensamiento intrusivo genera una obsesión.

- term: OMS
  definition: Organización Mundial de la Salud

- term: pensamiento intrusivo
  definition: Pensamiento, imagen, impulso o sensación no deseada que aparece de forma automática en casi todas las personas, pero que en los afectados de TOC adquiren demasiada importancia conviertiéndose en una obsesión.

- term: reconfirmación
  definition: Tipo de compulsión que consiste en la búsqueda repetida de certeza, seguridad y tranquilidad de que las obsesiones que se sienten no son reales o las compulsiones que se están realizando no son necesarias.

- term: ritual
  definition: Acciones o pensamientos repetitivos que la persona siente que debe hacer para reducir la ansiedad o prevenir un suceso temido. Suele ser un conjunto de compulsiones, aunque se suelen utilizar como sinónimos.

- term: rumiación
  definition: Darle vueltas una y otra vez a dudas, recuerdos, miedos, posibilidades intentando encontrar la certeza absoluta.

- term: TCC
  definition: |
    Terapia cognitivo-conductual. Es el tratamiento estándar para tratar el TOC. La parte cognitiva consiste en ayudar a reconocer y cuestionar las interpretaciones
    erróneas que se hacen de las obsesiones, mientras que la parte conductual consiste en exponerse gradualmente a tolerar la incertidumbre y el malestar sin recurrir a compulsiones o evitaciones.

- term: tolerancia a la incertidumbre
  definition: Capacidad de aceptar que no es posible tener certeza absoluta sobre todo. Suele ser uno de los objetivos de la terapia.

- term: validación emocional
  definition: Reconocimiento del sufrimiento sin reforzar el TOC.

- term: ventana de tolerancia
  definition: Rango óptimo de activación emocional y física dentro del cual una persona puede gestionar sus emociones, pensar con claridad y actuar eficazmente. Referido al nivel de ansiedad que provoca la terapia, es la ansiedad que una persona puede manejar sin sentirse completamente desbordada (hiperactivación) o apática (hipoactivación). Desde el punto de vista de la terapia, esta debe efectuarse dentro de esta ventana y de forma gradual. En realidad, todos deberíamos tratar de actuar y tomar decisiones cuando estamos dentro de la ventana de tolerancia.
