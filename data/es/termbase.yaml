- term: EPR
  definition: Exposición con Prevención de Respuesta. Técnica usada en la TCC para tratar el TOC

- term: OMS
  definition: Organización Mundial de la Salud

- term: TCC
  abbr: TCC
  definition: Terapia cognitivo-conductual - terapia estándar para tratar el TOC

- term: TOC
  definition: Transtorno obsesivo-compulsivo - tipo de trastorno mental caracterizado por las obsesiones y las compulsiones.

